<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="page" src="landing-v7.html?v=16"></iframe><script>const page=document.getElementById('page');function patch(){try{const outer=page.contentDocument,app=outer?.getElementById('app'),d=app?.contentDocument;if(!d)return setTimeout(patch,120);const plans=d.getElementById('plans');if(!plans)return setTimeout(patch,120);if(d.getElementById('plan72-disaster-grid'))return;const style=d.createElement('style');style.textContent=`#plan72-disaster-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.p72-disaster{border:1px solid var(--line);border-radius:26px;padding:22px;background:rgba(255,250,240,.82);min-height:340px;display:flex;flex-direction:column;transition:transform .2s ease,box-shadow .2s ease}.p72-disaster:hover{transform:translateY(-4px);box-shadow:0 18px 38px rgba(23,26,21,.08)}.p72-disaster.hidden-card{display:none}.p72-icon{width:68px;height:68px;border-radius:20px;background:var(--deep);display:grid;place-items:center;margin-bottom:24px}.p72-icon svg{width:42px;height:42px;stroke:var(--paper);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.p72-disaster h3{font-size:32px;margin:0 0 10px}.p72-disaster .p72-destination{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--rust);font-weight:900;margin-bottom:18px}.p72-bullets{display:grid;gap:12px;margin-top:auto}.p72-bullet{display:grid;grid-template-columns:8px 1fr;gap:10px;font-size:14px;line-height:1.48;color:rgba(23,26,21,.66)}.p72-bullet:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--rust);margin-top:7px}.p72-more-wrap{text-align:center;margin-top:24px}.p72-more{border:1px solid var(--ink);background:transparent;color:var(--ink);border-radius:999px;padding:13px 20px;font-weight:850;cursor:pointer}.p72-more:hover{background:var(--ink);color:var(--paper)}@media(max-width:900px){#plan72-disaster-grid{grid-template-columns:1fr}.p72-disaster{min-height:300px}}`;d.head.appendChild(style);plans.innerHTML=`<div class="shell"><div class="head"><h2 class="display"><span data-es>Un plan distinto<br>para cada catástrofe.</span><span data-en>A different plan<br>for each disaster.</span></h2><p class="muted"><span data-es>La catástrofe cambia el destino, la ruta y el equipamiento recomendado.</span><span data-en>The disaster changes the destination, route and recommended equipment.</span></p></div><div id="plan72-disaster-grid">${card('Inundación','Flood','Zona elevada','Elevated area',iconFlood(),['Potencia y peligro: el agua puede subir rápido, cortar accesos y arrastrar vehículos.','Lugar más seguro: terreno alto, fuera de cauces, túneles y zonas bajas.'],['Power and danger: water can rise quickly, cut access and sweep away vehicles.','Safest place: high ground, away from waterways, tunnels and low areas.'])}${card('Incendio forestal','Wildfire','Corredor despejado','Clear corridor',iconFire(),['Potencia y peligro: el fuego cambia de dirección y el humo reduce visibilidad y oxígeno.','Lugar más seguro: área sin vegetación, con salida múltiple y lejos del frente del fuego.'],['Power and danger: fire changes direction and smoke reduces visibility and oxygen.','Safest place: vegetation-free area with multiple exits, away from the fire front.'])}${card('Terremoto','Earthquake','Área abierta','Open area',iconQuake(),['Potencia y peligro: pueden caer fachadas, vidrios, postes y estructuras dañadas.','Lugar más seguro: espacio abierto, lejos de edificios, puentes y líneas eléctricas.'],['Power and danger: façades, glass, poles and damaged structures may fall.','Safest place: open space away from buildings, bridges and power lines.'])}${card('Tsunami','Tsunami','Altura inmediata','Immediate elevation',iconWave(),['Potencia y peligro: varias olas pueden entrar tierra adentro con enorme fuerza.','Lugar más seguro: punto elevado y alejado de la costa, sin esperar confirmación visual.'],['Power and danger: multiple waves can move inland with enormous force.','Safest place: elevated ground away from the coast, without waiting for visual confirmation.'],true)}${card('Erupción volcánica','Volcanic eruption','Fuera del valle','Outside the valley',iconVolcano(),['Potencia y peligro: ceniza, gases y flujos pueden seguir valles y cursos de agua.','Lugar más seguro: zona fuera de la dirección del viento y lejos de laderas y cauces.'],['Power and danger: ash, gases and flows can follow valleys and waterways.','Safest place: outside the wind direction and away from slopes and channels.'],true)}${card('Tormenta extrema','Severe storm','Refugio sólido','Solid shelter',iconStorm(),['Potencia y peligro: viento, granizo y objetos proyectados pueden causar impactos severos.','Lugar más seguro: edificio sólido, interior y lejos de ventanas o estructuras livianas.'],['Power and danger: wind, hail and flying debris can cause severe impacts.','Safest place: solid building, inside and away from windows or light structures.'],true)}${card('Deslizamiento','Landslide','Fuera de la pendiente','Away from slope',iconLandslide(),['Potencia y peligro: tierra y rocas pueden desplazarse de forma súbita y bloquear rutas.','Lugar más seguro: terreno estable, lejos de laderas, barrancos y cauces cargados.'],['Power and danger: soil and rocks can move suddenly and block routes.','Safest place: stable ground away from slopes, ravines and loaded channels.'],true)}${card('Calor extremo','Extreme heat','Zona fresca','Cool area',iconHeat(),['Potencia y peligro: la exposición prolongada puede provocar deshidratación y golpe de calor.','Lugar más seguro: espacio sombreado o climatizado, con acceso seguro a agua.'],['Power and danger: prolonged exposure can cause dehydration and heatstroke.','Safest place: shaded or cooled area with safe access to water.'],true)}</div><div class="p72-more-wrap"><button class="p72-more" id="p72More"><span data-es>Ver todas las catástrofes</span><span data-en>View all disasters</span></button></div></div>`;d.querySelectorAll('.p72-disaster[data-extra="1"]').forEach(x=>x.classList.add('hidden-card'));const btn=d.getElementById('p72More');btn.onclick=()=>{const expanded=btn.dataset.open==='1';d.querySelectorAll('.p72-disaster[data-extra="1"]').forEach(x=>x.classList.toggle('hidden-card',expanded));btn.dataset.open=expanded?'0':'1';btn.innerHTML=expanded?'<span data-es>Ver todas las catástrofes</span><span data-en>View all disasters</span>':'<span data-es>Ver menos</span><span data-en>Show less</span>';if(app.contentWindow.setLang)app.contentWindow.setLang(d.body.classList.contains('en')?'en':'es')};if(app.contentWindow.setLang)app.contentWindow.setLang(d.body.classList.contains('en')?'en':'es')}catch(e){setTimeout(patch,180)}}function card(es,en,destEs,destEn,icon,bes,ben,extra=false){return `<article class="p72-disaster" data-extra="${extra?1:0}"><div class="p72-icon">${icon}</div><h3><span data-es>${es}</span><span data-en>${en}</span></h3><div class="p72-destination"><span data-es>Lugar más seguro: ${destEs}</span><span data-en>Safest place: ${destEn}</span></div><div class="p72-bullets"><div class="p72-bullet"><span data-es>${bes[0]}</span><span data-en>${ben[0]}</span></div><div class="p72-bullet"><span data-es>${bes[1]}</span><span data-en>${ben[1]}</span></div></div></article>`}function iconFlood(){return '<svg viewBox="0 0 48 48"><path d="M5 28c6-5 10 5 16 0s10 5 16 0 6 0 6 0"/><path d="M5 36c6-5 10 5 16 0s10 5 16 0 6 0 6 0"/><path d="M24 7v14"/><path d="M18 15l6 6 6-6"/></svg>'}function iconFire(){return '<svg viewBox="0 0 48 48"><path d="M26 5c2 8-6 10-4 17 1 4 5 5 7 1 2-3 1-6 1-6 7 5 10 11 8 18-2 7-8 10-15 10S10 40 10 31c0-8 7-13 11-18 1 6 2 8 5 10"/></svg>'}function iconQuake(){return '<svg viewBox="0 0 48 48"><path d="M5 31h8l4-10 6 18 5-13 5 5h10"/><path d="M7 11h34"/><path d="M11 11l3 7m23-7-3 7"/></svg>'}function iconWave(){return '<svg viewBox="0 0 48 48"><path d="M4 33c7 0 8-7 15-7 8 0 8 7 15 7 5 0 7-3 10-6"/><path d="M6 24c8-13 22-17 34-6-7-2-11 1-14 5"/><path d="M4 40h40"/></svg>'}function iconVolcano(){return '<svg viewBox="0 0 48 48"><path d="M6 41l13-25h10l13 25"/><path d="M18 20l6 5 6-5"/><path d="M21 12c-3-3-1-7 2-8m5 8c4-3 3-7 0-9"/></svg>'}function iconStorm(){return '<svg viewBox="0 0 48 48"><path d="M12 26a9 9 0 0 1 8-14 10 10 0 0 1 18 5 7 7 0 0 1-1 14H13"/><path d="M16 35h10m-14 6h18m2-6h6"/><path d="M27 24l-4 8h5l-5 9"/></svg>'}function iconLandslide(){return '<svg viewBox="0 0 48 48"><path d="M5 39L22 9l21 30"/><circle cx="28" cy="18" r="3"/><circle cx="34" cy="25" r="4"/><path d="M15 29l7 5 7-4 7 5"/></svg>'}function iconHeat(){return '<svg viewBox="0 0 48 48"><circle cx="24" cy="17" r="7"/><path d="M24 3v5m0 18v5M10 17H5m38 0h-5M14 7l-4-4m28 0-4 4"/><path d="M10 39c4-5 8 5 12 0s8 5 12 0 4 0 4 0"/></svg>'}page.addEventListener('load',()=>setTimeout(patch,200));setInterval(patch,1200);</script></body></html>
