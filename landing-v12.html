<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v11.html?v=18"></iframe><script>const root=document.getElementById('root');function deepestDoc(){let d=root.contentDocument;for(let i=0;i<6&&d;i++){const f=[...d.querySelectorAll('iframe')].find(x=>{try{return x.contentDocument&&x.contentDocument.getElementById('plans')}catch(e){return false}});if(!f)break;d=f.contentDocument}return d}function patch(){try{const d=deepestDoc();const plans=d?.getElementById('plans');if(!plans)return setTimeout(patch,180);if(d.getElementById('p72-modern-scenarios'))return;const style=d.createElement('style');style.id='p72-modern-scenarios';style.textContent=`#plans{padding-top:92px!important}.p72-scenarios-head{display:grid;grid-template-columns:.95fr 1.05fr;gap:48px;align-items:end;margin-bottom:34px}.p72-scenarios-head h2{font-size:clamp(52px,6vw,84px);line-height:.9;margin:0}.p72-scenarios-head p{font-size:18px;line-height:1.6;color:rgba(23,26,21,.62);max-width:620px}.p72-feature-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.p72-feature{border:1px solid rgba(23,26,21,.12);border-radius:26px;background:rgba(255,250,240,.72);padding:26px;min-height:390px;display:flex;flex-direction:column;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}.p72-feature:hover{transform:translateY(-4px);border-color:rgba(169,93,54,.28);box-shadow:0 18px 40px rgba(23,26,21,.07)}.p72-iconbox{width:72px;height:72px;border-radius:20px;border:1px solid rgba(169,93,54,.18);background:rgba(255,250,240,.7);display:grid;place-items:center;margin-bottom:28px}.p72-iconbox svg{width:46px;height:46px;stroke:#171a15;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.p72-feature h3{font-size:38px;margin:0 0 8px}.p72-safe{font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:#a95d36;font-weight:900;margin-bottom:18px}.p72-rule{width:42px;height:1px;background:rgba(23,26,21,.12);margin-bottom:18px}.p72-points{display:grid;gap:14px;margin-top:auto}.p72-point{display:grid;grid-template-columns:8px 1fr;gap:11px;font-size:14px;line-height:1.48;color:rgba(23,26,21,.68)}.p72-point:before{content:"";width:7px;height:7px;border-radius:50%;background:#a95d36;margin-top:7px}.p72-more{margin-top:22px;border:1px solid rgba(23,26,21,.12);border-radius:26px;background:rgba(255,250,240,.56);overflow:hidden}.p72-more-toggle{width:100%;border:0;background:transparent;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;font:inherit;font-weight:850;font-size:18px;color:#171a15;cursor:pointer}.p72-chevron{width:11px;height:11px;border-right:2px solid #171a15;border-bottom:2px solid #171a15;transform:rotate(45deg);transition:transform .25s ease;margin-right:4px}.p72-more.open .p72-chevron{transform:rotate(225deg)}.p72-mini-row{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;padding:0 22px 22px}.p72-mini{border:1px solid rgba(23,26,21,.1);border-radius:18px;padding:13px;display:flex;align-items:center;gap:11px;background:rgba(255,250,240,.62);min-height:78px}.p72-mini-icon{width:44px;height:44px;border-radius:13px;border:1px solid rgba(169,93,54,.16);display:grid;place-items:center;flex:0 0 auto}.p72-mini-icon svg{width:30px;height:30px;stroke:#171a15;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.p72-mini strong{font-size:13px;line-height:1.2}.p72-mini.more{justify-content:center;color:#a95d36;font-weight:900}.p72-expanded{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding:0 22px;max-height:0;opacity:0;overflow:hidden;transition:max-height .45s ease,opacity .28s ease,padding .28s ease}.p72-more.open .p72-expanded{max-height:1600px;opacity:1;padding:0 22px 22px}.p72-detail{border-top:1px solid rgba(23,26,21,.1);padding:18px 4px 4px;display:grid;grid-template-columns:54px 1fr;gap:14px}.p72-detail-icon{width:54px;height:54px;border-radius:16px;border:1px solid rgba(169,93,54,.16);display:grid;place-items:center}.p72-detail-icon svg{width:34px;height:34px;stroke:#171a15;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.p72-detail h4{font-size:23px;margin:0 0 5px}.p72-detail .p72-safe{margin-bottom:10px}.p72-detail ul{margin:0;padding-left:18px;color:rgba(23,26,21,.66);font-size:13px;line-height:1.5}.p72-detail li+li{margin-top:5px}@media(max-width:1050px){.p72-scenarios-head{grid-template-columns:1fr}.p72-feature-grid{grid-template-columns:1fr}.p72-feature{min-height:330px}.p72-mini-row{grid-template-columns:repeat(2,1fr)}.p72-expanded{grid-template-columns:1fr}}@media(max-width:600px){#plans{padding-top:70px!important}.p72-scenarios-head{gap:18px}.p72-scenarios-head h2{font-size:54px}.p72-feature{padding:22px}.p72-mini-row{grid-template-columns:1fr}.p72-more-toggle{padding:18px 20px}.p72-expanded,.p72-more.open .p72-expanded{padding-left:18px;padding-right:18px}}`;d.head.appendChild(style);const icon={flood:`<svg viewBox="0 0 48 48"><path d="M24 5v15"/><path d="M18 14l6 6 6-6"/><path d="M6 29c6-5 10 5 16 0s10 5 16 0 4 0 4 0"/><path d="M6 37c6-5 10 5 16 0s10 5 16 0 4 0 4 0"/></svg>`,fire:`<svg viewBox="0 0 48 48"><path d="M26 5c2 8-6 10-4 17 1 4 5 5 7 1 2-3 1-6 1-6 7 5 10 11 8 18-2 7-8 10-15 10S10 40 10 31c0-8 7-13 11-18 1 6 2 8 5 10"/></svg>`,quake:`<svg viewBox="0 0 48 48"><path d="M6 12h36"/><path d="M6 31h9l4-12 7 20 5-14 5 6h6"/></svg>`,wave:`<svg viewBox="0 0 48 48"><path d="M5 32c7 0 8-7 15-7 8 0 8 7 15 7 5 0 7-3 8-6"/><path d="M7 24c8-13 22-17 34-6-7-2-11 1-14 5"/><path d="M5 40h38"/></svg>`,volcano:`<svg viewBox="0 0 48 48"><path d="M6 41l13-25h10l13 25"/><path d="M18 20l6 5 6-5"/><path d="M21 12c-3-3-1-7 2-8m5 8c4-3 3-7 0-9"/></svg>`,toxic:`<svg viewBox="0 0 48 48"><path d="M12 10h24v27H12z"/><path d="M12 17h24M12 31h24"/><circle cx="24" cy="24" r="4"/><path d="M21 21l6 6m0-6-6 6"/><path d="M34 39c0-4 3-7 4-9 1 2 4 5 4 9a4 4 0 0 1-8 0z"/></svg>`,hurricane:`<svg viewBox="0 0 48 48"><path d="M24 7c9 0 16 7 16 16S33 39 24 39 8 32 8 23 15 7 24 7z"/><circle cx="24" cy="23" r="4"/><path d="M24 7c-4 5-5 9-4 12m4 20c4-5 5-9 4-12M8 23c5 4 9 5 12 4m20-4c-5-4-9-5-12-4"/></svg>`,nuclear:`<svg viewBox="0 0 48 48"><circle cx="24" cy="16" r="8"/><path d="M24 24v6"/><path d="M16 35h16"/><path d="M18 30c-5 2-7 5-7 9h26c0-4-2-7-7-9"/><path d="M24 10v6l5 3m-5-3-5 3"/></svg>`,bomb:`<svg viewBox="0 0 48 48"><path d="M9 12h30"/><path d="M14 12l5 24h10l5-24"/><path d="M17 22h14"/></svg>`,invasion:`<svg viewBox="0 0 48 48"><path d="M7 38l11-11 7 7 16-18"/><path d="M31 16h10v10"/><path d="M10 12h10v8H10z"/></svg>`};const feature=(title,safe,ico,b1,b2)=>`<article class="p72-feature"><div class="p72-iconbox">${ico}</div><h3>${title}</h3><div class="p72-safe">${safe}</div><div class="p72-rule"></div><div class="p72-points"><div class="p72-point">${b1}</div><div class="p72-point">${b2}</div></div></article>`;const mini=(title,ico,more='')=>`<div class="p72-mini ${more}">${ico?`<div class="p72-mini-icon">${ico}</div>`:''}<strong>${title}</strong></div>`;const detail=(title,safe,ico,b1,b2)=>`<article class="p72-detail"><div class="p72-detail-icon">${ico}</div><div><h4>${title}</h4><div class="p72-safe">${safe}</div><ul><li>${b1}</li><li>${b2}</li></ul></div></article>`;plans.innerHTML=`<div class="shell"><div class="p72-scenarios-head"><h2 class="display"><span data-es>Preparados para<br>cada escenario.</span><span data-en>Prepared for<br>every scenario.</span></h2><p><span data-es>Cada plan adapta la ruta, el destino seguro y el equipamiento al tipo de catástrofe.</span><span data-en>Every plan adapts the safest route, destination and equipment to the type of catastrophe.</span></p></div><div class="p72-feature-grid">${feature('<span data-es>Inundación</span><span data-en>Flood</span>','<span data-es>Lugar más seguro: zona elevada</span><span data-en>Safest place: elevated area</span>',icon.flood,'<span data-es>Potencia y peligro: el agua puede subir rápido, cortar accesos y arrastrar vehículos.</span><span data-en>Power & danger: water can rise quickly, cut access and sweep away vehicles.</span>','<span data-es>Lugar más seguro: terreno alto, lejos de cauces, túneles y zonas bajas.</span><span data-en>Safest place: high ground away from waterways, tunnels and low areas.</span>')}${feature('<span data-es>Incendio forestal</span><span data-en>Wildfire</span>','<span data-es>Lugar más seguro: corredor despejado</span><span data-en>Safest place: clear corridor</span>',icon.fire,'<span data-es>Potencia y peligro: el fuego cambia de dirección y el humo reduce visibilidad y oxígeno.</span><span data-en>Power & danger: fire changes direction and smoke reduces visibility and oxygen.</span>','<span data-es>Lugar más seguro: área sin vegetación, con múltiples salidas y lejos del frente.</span><span data-en>Safest place: vegetation-free area with multiple exits, away from the fire front.</span>')}${feature('<span data-es>Terremoto</span><span data-en>Earthquake</span>','<span data-es>Lugar más seguro: área abierta</span><span data-en>Safest place: open area</span>',icon.quake,'<span data-es>Potencia y peligro: pueden caer fachadas, vidrios, postes y estructuras dañadas.</span><span data-en>Power & danger: façades, glass, poles and damaged structures may fall.</span>','<span data-es>Lugar más seguro: espacio abierto, lejos de edificios, puentes y líneas eléctricas.</span><span data-en>Safest place: open space away from buildings, bridges and power lines.</span>')}</div><div class="p72-more" id="p72ScenarioMore"><button class="p72-more-toggle" id="p72ScenarioToggle"><span><span data-es>Ver más escenarios</span><span data-en>Show more scenarios</span></span><i class="p72-chevron"></i></button><div class="p72-mini-row">${mini('<span data-es>Tsunami</span><span data-en>Tsunami</span>',icon.wave)}${mini('<span data-es>Erupción volcánica</span><span data-en>Volcanic eruption</span>',icon.volcano)}${mini('<span data-es>Derrame tóxico</span><span data-en>Toxic spill</span>',icon.toxic)}${mini('<span data-es>Huracán</span><span data-en>Hurricane</span>',icon.hurricane)}${mini('<span data-es>Ataque nuclear</span><span data-en>Nuclear attack</span>',icon.nuclear)}${mini('+3','', 'more')}</div><div class="p72-expanded">${detail('<span data-es>Tsunami</span><span data-en>Tsunami</span>','<span data-es>Lugar más seguro: altura inmediata</span><span data-en>Safest place: immediate elevation</span>',icon.wave,'<span data-es>Varias olas pueden avanzar tierra adentro con enorme fuerza.</span><span data-en>Several waves can move inland with enormous force.</span>','<span data-es>Subí de inmediato y alejate de la costa.</span><span data-en>Head uphill and away from the coast immediately.</span>')}${detail('<span data-es>Erupción volcánica</span><span data-en>Volcanic eruption</span>','<span data-es>Lugar más seguro: fuera del valle</span><span data-en>Safest place: outside the valley</span>',icon.volcano,'<span data-es>Ceniza, gases y flujos pueden seguir valles y cauces.</span><span data-en>Ash, gas and lava flows can follow valleys and channels.</span>','<span data-es>Movete contra el viento y lejos de laderas y cursos de agua.</span><span data-en>Move upwind and away from slopes and waterways.</span>')}${detail('<span data-es>Derrame tóxico</span><span data-en>Toxic spill</span>','<span data-es>Lugar más seguro: zona a barlovento</span><span data-en>Safest place: upwind safe zone</span>',icon.toxic,'<span data-es>Puede contaminar aire, suelo y agua.</span><span data-en>Spills can contaminate air, soil and water.</span>','<span data-es>Movete contra el viento y seguí el perímetro de aislamiento.</span><span data-en>Move upwind and follow isolation guidance.</span>')}${detail('<span data-es>Huracán</span><span data-en>Hurricane</span>','<span data-es>Lugar más seguro: refugio sólido</span><span data-en>Safest place: solid shelter</span>',icon.hurricane,'<span data-es>Viento, lluvia y objetos proyectados pueden causar impactos graves.</span><span data-en>Wind, rain and flying debris can cause severe impacts.</span>','<span data-es>Quedate en una estructura sólida, lejos de ventanas.</span><span data-en>Stay inside a solid structure away from windows.</span>')}${detail('<span data-es>Ataque nuclear</span><span data-en>Nuclear attack</span>','<span data-es>Lugar más seguro: refugio reforzado</span><span data-en>Safest place: hardened shelter</span>',icon.nuclear,'<span data-es>Explosión, calor y lluvia radiactiva generan peligro extremo.</span><span data-en>Blast, heat and fallout create extreme danger.</span>','<span data-es>Entrá profundamente en un edificio o bajo tierra de inmediato.</span><span data-en>Get deep indoors or below ground immediately.</span>')}${detail('<span data-es>Bombardeo</span><span data-en>Bombing</span>','<span data-es>Lugar más seguro: interior reforzado</span><span data-en>Safest place: reinforced interior</span>',icon.bomb,'<span data-es>La onda expansiva y los escombros vuelven peligrosas las zonas expuestas.</span><span data-en>Shockwaves and debris make exposed areas unsafe.</span>','<span data-es>Usá un refugio interior protegido y lejos de ventanas.</span><span data-en>Use protected indoor shelter away from windows.</span>')}${detail('<span data-es>Invasión</span><span data-en>Invasion</span>','<span data-es>Lugar más seguro: refugio o ruta segura</span><span data-en>Safest place: secure shelter or route</span>',icon.invasion,'<span data-es>El conflicto puede bloquear caminos y cambiar corredores seguros rápidamente.</span><span data-en>Conflict can block roads and change safe corridors quickly.</span>','<span data-es>Seguí una ruta predefinida hacia un refugio seguro.</span><span data-en>Follow a predefined route to a secure shelter.</span>')}</div></div></div>`;const more=d.getElementById('p72ScenarioMore'),toggle=d.getElementById('p72ScenarioToggle');toggle.onclick=()=>{more.classList.toggle('open');if(window.parent&&window.parent.postMessage)window.parent.postMessage({type:'p72-resize'},'*')};const win=d.defaultView;if(win.setLang)win.setLang(d.body.classList.contains('en')?'en':'es')}catch(e){setTimeout(patch,220)}}root.addEventListener('load',()=>setTimeout(patch,300));setInterval(patch,1300);</script></body></html>
