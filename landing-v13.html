<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v12.html?v=19"></iframe><script>const root=document.getElementById('root');function getDocs(){const docs=[];let d=root.contentDocument;for(let i=0;i<8&&d;i++){docs.push(d);const f=[...d.querySelectorAll('iframe')].find(x=>{try{return !!x.contentDocument}catch(e){return false}});if(!f)break;d=f.contentDocument}return docs}function patch(){try{const docs=getDocs();if(!docs.length)return setTimeout(patch,160);for(const d of docs){const dashboard=d.getElementById('dashboard');if(dashboard)dashboard.remove();const dashboardLink=[...d.querySelectorAll('a')].find(a=>/dashboard/i.test((a.textContent||'').trim())&&a.getAttribute('href')==='#dashboard');if(dashboardLink)dashboardLink.remove()}const locationDoc=docs.find(d=>d.getElementById('globe')&&d.getElementById('stage'));if(!locationDoc)return setTimeout(patch,160);if(locationDoc.getElementById('p72-globe-fit-patch'))return;const script=locationDoc.createElement('script');script.id='p72-globe-fit-patch';script.textContent=`(()=>{const stage=document.getElementById('stage'),globeWrap=document.getElementById('globeWrap');if(!stage||!globeWrap||typeof globe==='undefined')return;const controls=globe.controls();controls.enableZoom=false;controls.enablePan=false;controls.minDistance=controls.getDistance?controls.getDistance():undefined;controls.maxDistance=controls.minDistance;const fitGlobe=()=>{const w=globeWrap.clientWidth||window.innerWidth,h=globeWrap.clientHeight||window.innerHeight,ratio=w/Math.max(1,h);let altitude=1.85;if(ratio<.78)altitude=3.05;else if(ratio<.95)altitude=2.72;else if(ratio<1.2)altitude=2.3;else if(ratio<1.55)altitude=2.02;globe.width(w).height(h);if(!stage.classList.contains('map-mode')&&!state.selectedCountry){globe.pointOfView({lat:15,lng:0,altitude},0)}};const stopManualZoom=e=>{if(e.type==='wheel')e.preventDefault()};globeWrap.addEventListener('wheel',stopManualZoom,{passive:false});globeWrap.style.touchAction='pan-y';window.addEventListener('resize',fitGlobe);window.addEventListener('orientationchange',()=>setTimeout(fitGlobe,250));new ResizeObserver(fitGlobe).observe(globeWrap);setTimeout(fitGlobe,50);setTimeout(fitGlobe,500);})();`;locationDoc.body.appendChild(script)}catch(e){setTimeout(patch,220)}}root.addEventListener('load',()=>setTimeout(patch,320));setInterval(patch,1400);</script></body></html>
