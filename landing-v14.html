<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v13.html?v=21"></iframe><script>const root=document.getElementById('root');function allDocs(){const out=[];const walk=d=>{if(!d||out.includes(d))return;out.push(d);for(const f of d.querySelectorAll('iframe')){try{walk(f.contentDocument)}catch(e){}}};try{walk(root.contentDocument)}catch(e){}return out}function patch(){try{const d=allDocs().find(x=>x.getElementById('globe')&&x.getElementById('countryBtn')&&x.getElementById('globeWrap'));if(!d)return setTimeout(patch,180);if(d.getElementById('p72-globe-scale-v21'))return;const s=d.createElement('script');s.id='p72-globe-scale-v21';s.textContent=`(()=>{const btn=document.getElementById('countryBtn'),wrap=document.getElementById('globeWrap'),stage=document.getElementById('stage');if(!btn||!wrap||!stage||typeof globe==='undefined')return;const mobile=()=>window.innerWidth<=900;const initialFit=()=>{if(stage.classList.contains('map-mode'))return;const w=wrap.clientWidth||window.innerWidth,h=wrap.clientHeight||window.innerHeight;globe.width(w).height(h);if(!state.selectedCountry){const altitude=mobile()?2.35:(w/h<1.05?2.25:1.85);globe.pointOfView({lat:15,lng:0,altitude},0)}};btn.addEventListener('click',()=>{setTimeout(()=>{if(!state.countryResult||stage.classList.contains('map-mode'))return;const altitude=mobile()?2.2:.56;globe.pointOfView({lat:+state.countryResult.lat,lng:+state.countryResult.lon,altitude},700)},980)});window.addEventListener('resize',()=>setTimeout(initialFit,80));window.addEventListener('orientationchange',()=>setTimeout(initialFit,300));new ResizeObserver(()=>setTimeout(initialFit,40)).observe(wrap);setTimeout(initialFit,80);})();`;d.body.appendChild(s)}catch(e){setTimeout(patch,220)}}root.addEventListener('load',()=>setTimeout(patch,350));setInterval(patch,1400);</script></body></html>
