<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v14.html?v=23"></iframe><script>
const HERO_IMG='https://raw.githubusercontent.com/rfullivarri/Plan72/main/public/ChatGPT%20Image%206%20jul%202026,%2020_31_10-Photoroom.png';
const root=document.getElementById('root');
function patch(){try{const d=root.contentDocument;if(!d)return setTimeout(patch,180);patchHero(d);patchLocation(d)}catch(e){setTimeout(patch,260)}}
function patchHero(d){const shot=d.querySelector('.productShot');if(!shot||d.getElementById('plan72-hero-photo-v18'))return;const st=d.createElement('style');st.id='plan72-hero-photo-v18';st.textContent='.heroGrid{align-items:start!important}.productShot{min-height:560px!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;overflow:visible!important;padding-top:0!important;margin-top:0!important;position:relative!important}.productShot::before{content:"";position:absolute;inset:4% 2% 0 4%;border-radius:44px;background:radial-gradient(circle at 52% 46%,rgba(17,22,16,.12),transparent 64%);filter:blur(12px);z-index:0;pointer-events:none}.heroKitPhoto{position:relative;z-index:1;width:min(720px,112%);max-width:none;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 34px 58px rgba(17,22,16,.22));transform:translateY(-4px)}@media(max-width:980px){.productShot{min-height:470px!important}.heroKitPhoto{width:min(620px,100%);transform:none}}@media(max-width:620px){.productShot{min-height:390px!important}.heroKitPhoto{width:112%;margin-left:-6%;filter:drop-shadow(0 22px 38px rgba(17,22,16,.2))}}';d.head.appendChild(st);shot.innerHTML='<img class="heroKitPhoto" src="'+HERO_IMG+'" alt="Plan72 backpack with emergency gear and printed route cards">'}
function patchLocation(d){const frame=d.querySelector('.locationFrame');if(!frame)return;if(!d.getElementById('plan72-location-expand-v18')){const st=d.createElement('style');st.id='plan72-location-expand-v18';st.textContent='.locationFrame{transition:border-radius .18s linear,box-shadow .18s linear;will-change:width,height,margin-left,transform,border-radius}.locationFrame.isFull{box-shadow:none!important}@media(max-width:620px){.locationFrame{height:1120px!important}}';d.head.appendChild(st)}if(frame.dataset.expandPatch!=='1'){frame.dataset.expandPatch='1';const win=root.contentWindow;function resizeLocation(){const vw=win.innerWidth;const vh=win.innerHeight;const nav=74;const r=frame.getBoundingClientRect();const start=vh*.88;const end=nav+6;let p=(start-r.top)/(start-end);p=Math.max(0,Math.min(1,p));const baseW=frame.parentElement.getBoundingClientRect().width;const targetW=vw;const w=baseW+(targetW-baseW)*p;const baseH=vw<700?1120:760;const targetH=vh-nav;const h=baseH+(targetH-baseH)*p;const radius=30*(1-p);frame.style.width=w+'px';frame.style.height=h+'px';frame.style.marginLeft='50%';frame.style.transform='translateX(-50%)';frame.style.borderRadius=radius+'px';if(p>.82)frame.classList.add('isFull');else frame.classList.remove('isFull')}win.addEventListener('scroll',resizeLocation,{passive:true});win.addEventListener('resize',resizeLocation);setTimeout(resizeLocation,100);setInterval(resizeLocation,700);frame.addEventListener('load',function(){wireInner(frame,root)});setTimeout(function(){wireInner(frame,root)},900)}}
function wireInner(frame,parentFrame){try{const doc=frame.contentDocument;if(!doc||doc.dataset.wheelPatch==='1')return;doc.dataset.wheelPatch='1';doc.addEventListener('wheel',function(e){const c=doc.querySelector('canvas');let inside=false;if(c){const r=c.getBoundingClientRect();const x=e.clientX-r.left;const y=e.clientY-r.top;const cx=r.width*.58;const cy=r.height*.55;const rad=Math.min(r.width,r.height)*.34;inside=((x-cx)*(x-cx)+(y-cy)*(y-cy))<rad*rad}if(!inside){e.preventDefault();parentFrame.contentWindow.scrollBy(0,e.deltaY)}},{capture:true,passive:false})}catch(e){}}
root.addEventListener('load',()=>setTimeout(patch,260));setInterval(patch,1000);
</script></body></html>
