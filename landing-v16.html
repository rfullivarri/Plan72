<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe#root{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v14.html?v=23"></iframe><script>
const HERO_IMG='https://raw.githubusercontent.com/rfullivarri/Plan72/main/public/ChatGPT%20Image%206%20jul%202026,%2020_31_10-Photoroom.png';
const root=document.getElementById('root');
function patch(){try{const d=root.contentDocument;if(!d)return setTimeout(patch,120);patchHero(d);patchLocation(d)}catch(e){setTimeout(patch,220)}}
function patchHero(d){const shot=d.querySelector('.productShot');if(!shot||d.getElementById('plan72-hero-photo-v20'))return;const st=d.createElement('style');st.id='plan72-hero-photo-v20';st.textContent='.heroGrid{align-items:start!important}.productShot{min-height:560px!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;overflow:visible!important;padding-top:0!important;margin-top:0!important;position:relative!important}.productShot::before{content:"";position:absolute;inset:4% 2% 0 4%;border-radius:44px;background:radial-gradient(circle at 52% 46%,rgba(17,22,16,.12),transparent 64%);filter:blur(12px);z-index:0;pointer-events:none}.heroKitPhoto{position:relative;z-index:1;width:min(720px,112%);max-width:none;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 34px 58px rgba(17,22,16,.22));transform:translateY(-4px)}@media(max-width:980px){.productShot{min-height:470px!important}.heroKitPhoto{width:min(620px,100%);transform:none}}@media(max-width:620px){.productShot{min-height:390px!important}.heroKitPhoto{width:112%;margin-left:-6%;filter:drop-shadow(0 22px 38px rgba(17,22,16,.2))}}';d.head.appendChild(st);shot.innerHTML='<img class="heroKitPhoto" src="'+HERO_IMG+'" alt="Plan72 backpack with emergency gear and printed route cards">'}
function patchLocation(d){const frame=d.querySelector('.locationFrame');const section=d.getElementById('location');if(!frame||!section)return;const head=section.querySelector('.head');const title=section.querySelector('.head h2');const copy=section.querySelector('.head p');if(title&&!title.dataset.v16Copy){title.dataset.v16Copy='1';title.innerHTML='<span data-en>Set your exact location.</span><span data-es>Marcá tu ubicación exacta.</span>'}if(copy&&!copy.dataset.v16Copy){copy.dataset.v16Copy='1';copy.innerHTML='<span data-en>The working globe, city and exact-address experience remains intact.</span><span data-es>La experiencia del globo, ciudad y dirección exacta se mantiene intacta.</span>'}if(!d.getElementById('plan72-location-immersive-v20')){const st=d.createElement('style');st.id='plan72-location-immersive-v20';st.textContent='#location.locationIntro{overflow:visible!important;padding-top:86px!important;padding-bottom:150vh!important;position:relative!important}.locationIntro .shell{overflow:visible!important}.locationIntro .head{align-items:end!important;margin-bottom:24px!important}.locationIntro .head h2{text-transform:uppercase!important}.locationFrame{display:block!important;width:100%!important;height:760px!important;max-width:none!important;border:0!important;border-radius:30px!important;overflow:hidden!important;background:#0f150f!important;box-shadow:0 28px 70px rgba(17,22,16,.12)!important;position:sticky!important;top:82px!important;z-index:5!important;will-change:width,height,border-radius,transform!important;transition:border-radius .12s linear,box-shadow .12s linear!important}.locationFrame.isFull{box-shadow:none!important}@media(max-width:980px){#location.locationIntro{padding-bottom:135vh!important}.locationFrame{height:900px!important;top:72px!important}}@media(max-width:620px){#location.locationIntro{padding-top:54px!important;padding-bottom:125vh!important}.locationIntro .head{grid-template-columns:1fr!important}.locationFrame{height:1040px!important;min-height:1040px!important;top:72px!important;border-radius:22px!important}}';d.head.appendChild(st)}if(frame.dataset.expandPatch==='2'){return}frame.dataset.expandPatch='2';const win=root.contentWindow;let raf=0;function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function resizeLocation(){raf=0;const vw=win.innerWidth;const vh=win.innerHeight;const nav=74;const r=frame.getBoundingClientRect();const start=vh*.78;const end=nav+2;const p=clamp((start-r.top)/(start-end),0,1);const ease=p*p*(3-2*p);const parentW=frame.parentElement.getBoundingClientRect().width;const targetW=vw;const w=parentW+(targetW-parentW)*ease;const baseH=vw<700?1040:760;const targetH=Math.max(640,vh-nav);const h=baseH+(targetH-baseH)*ease;const radius=(vw<620?22:30)*(1-ease);frame.style.width=w+'px';frame.style.height=h+'px';frame.style.marginLeft='50%';frame.style.transform='translateX(-50%)';frame.style.borderRadius=radius+'px';frame.style.overflow='hidden';frame.classList.toggle('isFull',ease>.68)}function scheduleResize(){if(!raf)raf=win.requestAnimationFrame(resizeLocation)}win.addEventListener('scroll',scheduleResize,{passive:true});win.addEventListener('resize',scheduleResize);setTimeout(resizeLocation,40);setInterval(resizeLocation,250);frame.addEventListener('load',function(){wireInner(frame,root)});setTimeout(function(){wireInner(frame,root)},350);setInterval(function(){wireInner(frame,root)},1000)}
function wireInner(frame,parentFrame){try{const doc=frame.contentDocument;if(!doc||doc.dataset.wheelPatch==='3')return;doc.dataset.wheelPatch='3';const parentWin=parentFrame.contentWindow;function sendScroll(delta){parentWin.scrollBy({top:delta,left:0,behavior:'auto'})}function insideGlobe(e){const c=doc.querySelector('canvas');if(!c)return false;const r=c.getBoundingClientRect();const x=e.clientX-r.left;const y=e.clientY-r.top;const cx=r.width*.62;const cy=r.height*.52;const rad=Math.min(r.width,r.height)*.34;return (x-cx)*(x-cx)+(y-cy)*(y-cy)<rad*rad}function handler(e){if(!insideGlobe(e)){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();sendScroll(e.deltaY||0)}}doc.defaultView&&doc.defaultView.addEventListener('wheel',handler,{capture:true,passive:false});doc.addEventListener('wheel',handler,{capture:true,passive:false});doc.documentElement&&doc.documentElement.addEventListener('wheel',handler,{capture:true,passive:false});doc.body&&doc.body.addEventListener('wheel',handler,{capture:true,passive:false});const c=doc.querySelector('canvas');if(c)c.addEventListener('wheel',handler,{capture:true,passive:false})}catch(e){}}
root.addEventListener('load',()=>setTimeout(patch,180));setInterval(patch,500);
</script></body></html>
