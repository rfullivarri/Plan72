const root=document.getElementById('root');function patch(){try{const d=root.contentDocument;if(!d)return setTimeout(patch,160);const shot=d.querySelector('.productShot');if(!shot)return setTimeout(patch,160);if(d.getElementById('plan72-hero-photo-v17'))return;const st=d.createElement('style');st.id='plan72-hero-photo-v17';st.textContent='.heroGrid{align-items:start!important}.productShot{min-height:560px!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;overflow:visible!important;padding-top:0!important;margin-top:0!important;position:relative!important}.productShot::before{content:"";position:absolute;inset:4% 2% 0 4%;border-radius:44px;background:radial-gradient(circle at 52% 46%,rgba(17,22,16,.12),transparent 64%);filter:blur(12px);z-index:0;pointer-events:none}.heroKitPhoto{position:relative;z-index:1;width:min(720px,112%);max-width:none;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 34px 58px rgba(17,22,16,.22));transform:translateY(-4px)}@media(max-width:980px){.productShot{min-height:470px!important}.heroKitPhoto{width:min(620px,100%);transform:none}}@media(max-width:620px){.productShot{min-height:390px!important}.heroKitPhoto{width:112%;margin-left:-6%;filter:drop-shadow(0 22px 38px rgba(17,22,16,.2))}}';d.head.appendChild(st);shot.innerHTML='<img class="heroKitPhoto" src="'+HERO_IMG+'" alt="Plan72 backpack with emergency gear and printed route cards">'}catch(e){setTimeout(patch,220)}}root.addEventListener('load',()=>setTimeout(patch,260));setInterval(patch,1200);</script></body></html>
