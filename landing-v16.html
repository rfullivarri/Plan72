<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe#root{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v14.html?v=23"></iframe><script>
const HERO_IMG='https://raw.githubusercontent.com/rfullivarri/Plan72/main/public/ChatGPT%20Image%206%20jul%202026,%2020_31_10-Photoroom.png';
const root=document.getElementById('root');
function patch(){try{const d=root.contentDocument;if(!d)return setTimeout(patch,150);patchHero(d);patchLocation(d)}catch(e){setTimeout(patch,250)}}
function patchHero(d){const shot=d.querySelector('.productShot');if(!shot||d.getElementById('plan72-hero-photo-v19'))return;const st=d.createElement('style');st.id='plan72-hero-photo-v19';st.textContent='.heroGrid{align-items:start!important}.productShot{min-height:560px!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;overflow:visible!important;padding-top:0!important;margin-top:0!important;position:relative!important}.productShot::before{content:"";position:absolute;inset:4% 2% 0 4%;border-radius:44px;background:radial-gradient(circle at 52% 46%,rgba(17,22,16,.12),transparent 64%);filter:blur(12px);z-index:0;pointer-events:none}.heroKitPhoto{position:relative;z-index:1;width:min(720px,112%);max-width:none;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 34px 58px rgba(17,22,16,.22));transform:translateY(-4px)}@media(max-width:980px){.productShot{min-height:470px!important}.heroKitPhoto{width:min(620px,100%);transform:none}}@media(max-width:620px){.productShot{min-height:390px!important}.heroKitPhoto{width:112%;margin-left:-6%;filter:drop-shadow(0 22px 38px rgba(17,22,16,.2))}}';d.head.appendChild(st);shot.innerHTML='<img class="heroKitPhoto" src="'+HERO_IMG+'" alt="Plan72 backpack with emergency gear and printed route cards">'}
function patchLocation(d){const frame=d.querySelector('.locationFrame');if(!frame)return;if(!d.getElementById('plan72-location-expand-v19')){const st=d.createElement('style');st.id='plan72-location-expand-v19';st.textContent='#location,.locationIntro{overflow:visible!important}.locationFrame{display:block!important;max-width:none!important;transition:width .12s linear,height .12s linear,border-radius .12s linear,box-shadow .12s linear!important;will-change:width,height,border-radius!important;position:relative!important;z-index:5!important;background:#0f150f!important}.locationFrame.isFull{box-shadow:none!important}@media(max-width:620px){.locationFrame{min-height:1040px!important}}';d.head.appendChild(st)}if(frame.dataset.expandPatch!=='1'){frame.dataset.expandPatch='1';const win=root.contentWindow;function resizeLocation(){const vw=win.innerWidth;const vh=win.innerHeight;const nav=74;const r=frame.getBoundingClientRect();const start=vh*.72;const end=nav+2;let p=(start-r.top)/(start-end);p=Math.max(0,Math.min(1,p));const ease=p*p*(3-2*p);const baseW=frame.parentElement.getBoundingClientRect().width;const targetW=vw;const w=baseW+(targetW-baseW)*ease;const baseH=vw<700?1040:760;const targetH=Math.max(620,vh-nav);const h=baseH+(targetH-baseH)*ease;const radius=30*(1-ease);frame.style.width=w+'px';frame.style.height=h+'px';frame.style.marginLeft='50%';frame.style.transform='translateX(-50%)';frame.style.borderRadius=radius+'px';frame.style.overflow='hidden';if(ease>.72)frame.classList.add('isFull');else frame.classList.remove('isFull')}win.addEventListener('scroll',resizeLocation,{passive:true});win.addEventListener('resize',resizeLocation);setTimeout(resizeLocation,50);setInterval(resizeLocation,250);frame.addEventListener('load',function(){wireInner(frame,root)});setTimeout(function(){wireInner(frame,root)},700)}}
function wireInner(frame,parentFrame){try{const doc=frame.contentDocument;if(!doc||doc.dataset.wheelPatch==='2')return;doc.dataset.wheelPatch='2';const sendScroll=function(delta){parentFrame.contentWindow.scrollBy({top:delta,left:0,behavior:'auto'})};const handler=function(e){const c=doc.querySelector('canvas');let insideSphere=false;if(c){const r=c.getBoundingClientRect();const x=e.clientX-r.left;const y=e.clientY-r.top;const cx=r.width*.62;const cy=r.height*.52;const rad=Math.min(r.width,r.height)*.32;insideSphere=((x-cx)*(x-cx)+(y-cy)*(y-cy))<rad*rad}if(!insideSphere){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();sendScroll(e.deltaY)}};doc.addEventListener('wheel',handler,{capture:true,passive:false});doc.body&&doc.body.addEventListener('wheel',handler,{capture:true,passive:false});const c=doc.querySelector('canvas');if(c)c.addEventListener('wheel',handler,{capture:true,passive:false})}catch(e){}}
root.addEventListener('load',()=>setTimeout(patch,220));setInterval(patch,600);
</script></body></html>
