<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="root" src="landing-v14.html?v=25"></iframe><script>
const HERO_IMG='https://raw.githubusercontent.com/rfullivarri/Plan72/main/public/plan72_hero_user_supplied.png';
const root=document.getElementById('root');function patch(){try{const d=root.contentDocument;if(!d)return setTimeout(patch,160);const shot=d.querySelector('.productShot');if(!shot)return setTimeout(patch,160);if(d.getElementById('plan72-hero-photo-v16'))return;const st=d.createElement('style');st.id='plan72-hero-photo-v16';st.textContent='.productShot{min-height:560px;align-items:center!important;justify-items:center!important;overflow:visible}.productShot::before{content:"";position:absolute;inset:8% 2% 0 6%;border-radius:44px;background:radial-gradient(circle at 50% 55%,rgba(17,22,16,.10),transparent 62%);filter:blur(10px);z-index:0}.heroKitPhoto{position:relative;z-index:1;width:min(670px,112%);max-width:none;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 34px 58px rgba(17,22,16,.22));transform:translateX(2%) translateY(2%)}@media(max-width:980px){.productShot{min-height:480px}.heroKitPhoto{width:min(620px,100%);transform:none}}@media(max-width:620px){.productShot{min-height:390px}.heroKitPhoto{width:112%;margin-left:-6%;filter:drop-shadow(0 22px 38px rgba(17,22,16,.2))}}';d.head.appendChild(st);shot.innerHTML='<img class="heroKitPhoto" src="'+HERO_IMG+'" alt="Plan72 backpack with emergency gear and printed route cards">'}catch(e){setTimeout(patch,220)}}root.addEventListener('load',()=>setTimeout(patch,260));setInterval(patch,1200);</script></body></html>
