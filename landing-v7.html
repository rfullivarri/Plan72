<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="app" src="landing-v6.html"></iframe><script>const frame=document.getElementById('app');frame.addEventListener('load',()=>{const w=frame.contentWindow,d=frame.contentDocument;const style=d.createElement('style');style.textContent=`#system{display:none!important}#build{padding-top:92px}.mergedFlow{display:grid;grid-template-columns:.82fr 54px 1fr 54px 1.05fr;gap:14px;align-items:stretch}.mergedCard{border-radius:28px;padding:28px;min-height:470px}.mergedLight{background:rgba(255,250,240,.82);border:1px solid var(--line)}.mergedDark{background:var(--deep);color:var(--paper)}.mergedOlive{background:linear-gradient(145deg,#6f7d62,#263124);color:var(--paper);position:relative;overflow:hidden}.mergedCard h3{font-size:38px;margin:12px 0 18px}.mergedArrow{display:grid;place-items:center;font-size:38px;color:var(--rust)}.mergedField{padding:16px 0;border-bottom:1px solid var(--line)}.mergedField:last-child{border:0}.mergedField strong,.mergedField span{display:block}.mergedField span{font-size:13px;margin-top:4px;opacity:.58}.mergedDark .mergedField{border-color:rgba(255,255,255,.14)}.mergedMap{height:160px;border-radius:18px;background:#d9d8ce;margin:18px 0;overflow:hidden}.mergedMap svg{width:100%;height:100%}.mergedBag{display:grid;grid-template-columns:.42fr .58fr;gap:16px;align-items:end}.mergedBag svg{width:100%;filter:drop-shadow(0 24px 24px rgba(0,0,0,.2))}.mergedChoice{padding:13px 15px;border:1px solid rgba(255,255,255,.15);border-radius:17px;margin-bottom:9px}.mergedChoice.active{background:var(--paper);color:var(--ink)}.mergedChoice strong,.mergedChoice span{display:block}.mergedChoice span{font-size:12px;opacity:.62;margin-top:3px}.mergedNote{text-align:center;m span data-es>Más redundancia.</span><span data-en>More redundancy.</span></span></div><h3 class="display" style="font-size:48px">Prepared</h3><p><span data-es>Filtro, depósitos, iluminación, energía, radio, refugio ligero y herramientas.</span><span data-en>Filter, containers, lighting, power, radio, light shelter and tools.</span></p></div></div></article></div><p class="mergedNote"><span data-es>El nivel define el contenido. La cantidad de personas define las unidades necesarias.</span><span data-en>The level defines the contents. The number of people defines the quantities needed.</span></p></div>`}const loc=d.querySelector('.locationEmbed');if(loc){const section=loc.closest('section');const shell=loc.parentElement;const scroll=d.createElement('div');scroll.className='locationScrollShell';const sticky=d.createElement('div');sticky.className='locationScrollSticky';shell.removeChild(loc);sticky.appendChild(loc);scroll.appendChild(sticky);section.after(scroll);loc.style.width='min(1180px,calc(100% - 36px))';loc.style.height='82vh';const expand=()=>{const r=scroll.getBoundingClientRect(),range=scroll.offsetHeight-w.innerHeight,p=Math.max(0,Math.min(1,-r.top/Math.max(1,range)));const base=Math.min(1180,w.innerWidth-36);loc.style.width=(base+(w.innerWidth-base)*p)+'px';loc.style.height=(82+18*p)+'vh';loc.style.borderRadius=(34*(1-p))+'px'};w.addEventListener('scroll',expand,{passive:true});w.addEventListener('resize',expand);expand()}const setLang=w.setLang;if(setLang)setLang(d.body.classList.contains('en')?'en':'es')});</script></body></html>
