<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Plan72</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3ead8}iframe{width:100%;height:100%;border:0;display:block}</style></head><body><iframe id="app" src="landing-v6.html?v=11"></iframe><script>const frame=document.getElementById('app');frame.addEventListener('load',()=>{const w=frame.contentWindow,d=frame.contentDocument;const css=d.createElement('style');css.textContent=`#system{display:none!important}#build{padding-top:92px}.mergedFlow{display:grid;grid-template-columns:.85fr 52px 1fr 52px 1.05fr;gap:14px;align-items:stretch}.mergedCard{border-radius:28px;padding:28px;min-height:440px}.mergedLight{background:rgba(255,250,240,.82);border:1px solid var(--line)}.mergedDark{background:var(--deep);color:var(--paper)}.mergedOlive{background:linear-gradient(145deg,#6f7d62,#263124);color:var(--paper)}.mergedCard h3{font-size:38px;margin:12px 0 18px}.mergedArrow{display:grid;place-items:center;font-size:38px;color:var(--rust)}.mergedField{padding:15px 0;border-bottom:1px solid var(--line)}.mergedField:last-child{border:0}.mergedField strong,.mergedField span{display:block}.mergedField span{font-size:13px;margin-top:4px;opacity:.58}.mergedDark .mergedField{border-color:rgba(255,255,255,.14)}.mergedChoice{padding:13px 15px;border:1px solid rgba(255,255,255,.15);border-radius:17px;margin-bottom:9px}.mergedChoice.active{background:var(--paper);color:var(--ink)}.mergedNote{text-align:center;margin-top:18px;color:rgba(23,26,21,.6)}.locationSectionTight{padding-bottom:12px!important}.locationSectionTight .head{margin-bottom:0!important}.locationScrollShell{height:155vh;position:relative}.locationScrollSticky{position:sticky;top:74px;height:calc(100vh - 74px);display:flex;align-items:flex-start;justify-content:center;overflow:hidden;background:#f3ead8}.locationEmbed{margin:0!important;box-shadow:none!important;background:#111610!important;will-change:width,height,border-radius}.locationEmbed iframe{height:100%!important}@media(max-width:1050px){.mergedFlow{grid-template-columns:1fr}.mergedArrow{transform:rotate(90deg);height:44px}}`;d.head.appendChild(css);const build=d.getElementById('build');if(build)build.innerHTML=`<div class="shell"><div class="head"><h2 class="display"><span data-es>Un plan.<br>Una mochila.</span><span data-en>One plan.<br>One backpack.</span></h2><p class="muted"><span data-es>Vos das lo básico. Plan72 devuelve el plan y recomienda la mochila correcta para ejecutarlo.</span><span data-en>You provide the basics. Plan72 returns the plan and recommends the right backpack to execute it.</span></p></div><div class="mergedFlow"><article class="mergedCard mergedLight"><small>01</small><h3 class="display"><span data-es>Vos das</span><span data-en>You provide</span></h3><div class="mergedField"><strong><span data-es>Ubicación</span><span data-en>Location</span></strong><span><span data-es>País, ciudad y dirección.</span><span data-en>Country, city and address.</span></span></div><div class="mergedField"><strong><span data-es>Personas</span><span data-en>People</span></strong><span><span data-es>Cuántas personas incluye el plan.</span><span data-en>How many people the plan covers.</span></span></div><div class="mergedField"><strong><span data-es>Refugio propio</span><span data-en>Private shelter</span></strong><span><span data-es>Segunda residencia o refugio, opcional.</span><span data-en>Second home or shelter, optional.</span></span></div></article><div class="mergedArrow">→</div><article class="mergedCard mergedDark"><small>02</small><h3 class="display"><span data-es>Plan72 devuelve</span><span data-en>Plan72 returns</span></h3><div class="mergedField"><strong><span data-es>Destino seguro</span><span data-en>Safe destination</span></strong><span><span data-es>Según cada catástrofe.</span><span data-en>For each disaster.</span></span></div><div class="mergedField"><strong><span data-es>Ruta y alternativas</span><span data-en>Route and alternatives</span></strong><span><span data-es>Con Decision Points.</span><span data-en>With Decision Points.</span></span></div><div class="mergedField"><strong><span data-es>Tarjetas</span><span data-en>Cards</span></strong><span><span data-es>Para guardar, imprimir y llevar.</span><span data-en>To save, print and carry.</span></span></div></article><div class="mergedArrow">→</div><article class="mergedCard mergedOlive"><small>03</small><h3 class="display"><span data-es>Mochila recomendada</span><span data-en>Recommended backpack</span></h3><div class="mergedChoice"><strong>Essential</strong><span><span data-es>Base durable.</span><span data-en>Durable base.</span></span></div><div class="mergedChoice active"><strong>Prepared</strong><span><span data-es>La recomendada.</span><span data-en>The recommended setup.</span></span></div><div class="mergedChoice"><strong>Pro</strong><span><span data-es>Más redundancia.</span><span data-en>More redundancy.</span></span></div><p><span data-es>El nivel define el contenido; las personas definen las cantidades.</span><span data-en>The level defines contents; people define quantities.</span></p></article></div><p class="mergedNote"><span data-es>Plan, mochila y cantidades quedan conectados en una sola decisión.</span><span data-en>Plan, backpack and quantities are connected in one decision.</span></p></div>`;const loc=d.querySelector('.locationEmbed');if(loc){const section=loc.closest('section');section.classList.add('locationSectionTight');const shell=loc.parentElement;const scroll=d.createElement('div');scroll.className='locationScrollShell';const sticky=d.createElement('div');sticky.className='locationScrollSticky';shell.removeChild(loc);sticky.appendChild(loc);scroll.appendChild(sticky);section.after(scroll);const inner=loc.querySelector('iframe');inner.src='location-embed-v2.html?v=11';loc.style.width='min(1180px,calc(100% - 36px))';loc.style.height='calc(100vh - 98px)';loc.style.borderRadius='30px';const expand=()=>{const r=scroll.getBoundingClientRect(),range=Math.max(1,scroll.offsetHeight-w.innerHeight),p=Math.max(0,Math.min(1,(74-r.top)/range)),base=Math.min(1180,w.innerWidth-36);loc.style.width=(base+(w.innerWidth-base)*p)+'px';loc.style.height=(90+10*p)+'vh';loc.style.borderRadius=(30*(1-p))+'px'};w.addEventListener('scroll',expand,{passive:true});w.addEventListener('resize',expand);expand()}if(w.setLang)w.setLang(d.body.classList.contains('en')?'en':'es')});</script></body></html>
